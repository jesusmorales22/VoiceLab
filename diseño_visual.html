<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceMod Studio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        
        .filter-card {
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid rgba(0,0,0,.125);
        }
        
        .filter-card:hover {
            transform: translateY(-5px);
            border-color: #0d6efd;
        }
        
        /* Clase para cuando se selecciona un filtro */
        .filter-card.active {
            background-color: #0d6efd !important;
            color: white;
            border-color: #0d6efd;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: white;
        }

        /* Ocultar el resultado al principio */
        #resultado {
            display: none;
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-mic-fill me-2"></i>VoiceLab Studio</span>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <!-- Columna de Carga -->
        <div class="col-md-8 mb-4">
            <div class="upload-area shadow-sm">
                <i class="bi bi-cloud-arrow-up-fill display-1 text-primary"></i>
                <h3 class="mt-3">Carga tu audio</h3>
                <p class="text-muted">Arrastra tu archivo .mp3 o .wav aquí</p>
                <input type="file" class="form-control" id="audioInput" accept="audio/*">
            </div>
        </div>

        <!-- Panel de Filtros (8 Filtros) -->
        <div class="col-md-10">
            <h4 class="mb-3 text-center">Selecciona un Filtro</h4>
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 1')">
                        <span>Filtro 1</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 2')">
                        <span>Filtro 2</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 3')">
                        <span>Filtro 3</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 4')">
                        <span>Filtro 4</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 5')">
                        <span>Filtro 5</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 6')">
                        <span>Filtro 6</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 7')">
                        <span>Filtro 7</span>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card filter-card text-center p-3 shadow-sm" onclick="seleccionarFiltro(this, 'Filtro 8')">
                        <span>Filtro 8</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botón de Acción -->
        <div class="col-md-10 text-center mt-5">
            <button class="btn btn-primary btn-lg px-5 shadow" id="btnProcesar">
                <i class="bi bi-magic me-2"></i>Aplicar Filtro
            </button>
        </div>

        <!-- Sección de Reproductor (Se muestra al procesar) -->
        <div class="col-md-8" id="resultado">
            <div class="text-center">
                <h5 class="mb-3 text-success font-monospace">RESULTADO: <span id="nombreFiltroAplicado"></span></h5>
                <audio id="audioReproductor" controls class="w-100 mb-3">
                    Tu navegador no soporta el audio.
                </audio>
                <br>
                <a href="#" class="btn btn-outline-dark btn-sm">
                    <i class="bi bi-download"></i> Descargar Audio
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5 py-3 text-muted">
    <small>VoiceLab Studio 2026 - Frontend Design</small>
</footer>

<!-- JavaScript para la lógica visual -->
<script>
    let filtroSeleccionado = "";

    function seleccionarFiltro(elemento, nombre) {
        // Quitar clase activa de todos los filtros
        const cards = document.querySelectorAll('.filter-card');
        cards.forEach(card => card.classList.remove('active'));
        
        // Añadir clase activa al seleccionado
        elemento.classList.add('active');
        filtroSeleccionado = nombre;
    }

    document.getElementById('btnProcesar').addEventListener('click', function() {
        if (filtroSeleccionado === "") {
            alert("Por favor, selecciona un filtro primero.");
            return;
        }

        const btn = this;
        const resultadoDiv = document.getElementById('resultado');
        
        // Simular carga en el botón
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Procesando...';
        btn.disabled = true;

        setTimeout(() => {
            // Resetear botón
            btn.innerHTML = '<i class="bi bi-magic me-2"></i>Aplicar Filtro';
            btn.disabled = false;

            // Mostrar el reproductor
            document.getElementById('nombreFiltroAplicado').innerText = filtroSeleccionado;
            resultadoDiv.style.display = 'block';
            
            // Scroll suave hasta el reproductor
            resultadoDiv.scrollIntoView({ behavior: 'smooth' });
        }, 1500);
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
